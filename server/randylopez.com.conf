# randylopez.com — nginx server block
# ---------------------------------------------------------------------------
# Repo layout (after the reorg):
#   frontend/   the SolidJS + Vite app   (build output lands in frontend/dist)
#   server/     this nginx config        (was nginx/sites-available)
#
# Build & deploy:
#   cd frontend && npm ci && npm run build      # produces frontend/dist
#   publish the repo (or just frontend/dist) to the server, then:
#   sudo ln -s /etc/nginx/sites-available/randylopez.com.conf \
#              /etc/nginx/sites-enabled/randylopez.com.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: `root` is a path on the SERVER. It's set below to match the new
# frontend/dist location — adjust the prefix (/var/www/randylopez.com) to
# wherever you actually publish the repo on the box.
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name randylopez.com www.randylopez.com;

    # UPDATED PATH: the built frontend now lives under frontend/dist
    root /var/www/randylopez.com/frontend/dist;
    index index.html;

    # Vite emits content-hashed files under /assets — cache them hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: any unknown path serves the app shell
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}

# ---------------------------------------------------------------------------
# HTTPS: if you terminate TLS here (e.g. via certbot), keep your existing
# `listen 443 ssl;` server block and just update its `root` the same way:
#
#     root /var/www/randylopez.com/frontend/dist;
#
# and add a redirect from the :80 block above with:
#     return 301 https://$host$request_uri;
# ---------------------------------------------------------------------------
