server {
    listen 80;
    listen [::]:80;

    server_name randylopez.com www.randylopez.com;

    root /var/www/randylopez.com/randylopez.com/dist;
    index index.html;

    access_log /var/log/nginx/randylopez.com.access.log;
    error_log /var/log/nginx/randylopez.com.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}